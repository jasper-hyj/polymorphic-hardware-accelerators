# ┌─────────────────────────────────────────────────────────────────────┐
# │  Polymorphic Hardware Accelerator — Docker Compose                  │
# │                                                                     │
# │  Each service maps to one (or all) analysis phases.                 │
# │  Usage:  docker compose run <service> [extra-flags]                 │
# └─────────────────────────────────────────────────────────────────────┘

x-common: &common
  build: .
  image: rtl-analyzer:latest
  volumes:
    - ./verilog_proj:/app/verilog_proj
    - ./demo_projects:/app/demo_projects
    - ./output:/app/output
    - ./config.yaml:/app/config.yaml:ro
    - ./.cache:/app/.cache
  environment:
    - GITHUB_TOKEN=${GITHUB_TOKEN:-}
    - OMP_NUM_THREADS=0
  cpu_shares: 1024
  shm_size: "2g"
  ulimits:
    nofile:
      soft: 1048576
      hard: 1048576
    memlock:
      soft: -1
      hard: -1
  deploy:
    resources:
      reservations:
        cpus: "1.0"
        memory: "512m"

services:
  # ── All analyses (full pipeline) ───────────────────────────────────
  rtl-analyzer:
    <<: *common
    command: ["--all"]

  # ── Individual analyses ────────────────────────────────────────────
  similarity:
    <<: *common
    command: ["--similarity"]

  anomaly:
    <<: *common
    command: ["--anomaly"]

  surprise:
    <<: *common
    command: ["--surprise"]

  interface:
    <<: *common
    command: ["--interface"]

  pha:
    <<: *common
    command: ["--pha"]

  edit-distance:
    <<: *common
    command: ["--edit-distance", "--ed-max-projects", "20"]

  # ── Interactive development shell ──────────────────────────────────
  # Usage:  docker compose run dev
  #         make local-demo   (inside the shell)
  dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: rtl-analyzer-dev:latest
    volumes:
      - .:/app
      - rtl-cache:/app/.cache
    environment:
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
    entrypoint: ["/bin/bash"]
    stdin_open: true
    tty: true

volumes:
  rtl-cache:
